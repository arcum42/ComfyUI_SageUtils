<div class="prompt-card">
    <div class="prompt-header">
        <h4 class="prompt-name">{{name}}</h4>
        <div class="prompt-actions">
            <button class="load-btn" title="Load Prompt">Load</button>
            <button class="delete-btn" title="Delete Prompt">×</button>
        </div>
    </div>
    <div class="prompt-preview">{{preview}}</div>
    <div class="prompt-meta">
        <span class="category">{{category}}</span>
        <span class="usage">Used {{usageCount}} times</span>
    </div>
</div>
