<div class="civitai-dialog-content">
    <div class="civitai-dialog-header">
        <h2 class="civitai-dialog-title">{{modelName}}</h2>
        <div class="civitai-dialog-meta">
            <div>
                <span class="civitai-dialog-meta-label">by</span>
                <strong class="civitai-dialog-meta-creator">{{creator}}</strong>
                <span class="civitai-dialog-meta-label">Type:</span>
                <strong class="civitai-dialog-meta-type">{{type}}</strong>
            </div>
            <a href="{{modelUrl}}" target="_blank" class="civitai-dialog-link">View on Civitai →</a>
        </div>
        <div class="civitai-dialog-stats"></div>
    </div>
    <div class="civitai-dialog-description">
        <h3 class="civitai-dialog-description-title">Description</h3>
        <div class="civitai-dialog-description-text">{{descriptionText}}</div>
    </div>
</div>
