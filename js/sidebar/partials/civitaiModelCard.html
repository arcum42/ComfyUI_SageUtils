<div class="civitai-model-card">
    <div class="civitai-model-card-inner">
        <div class="civitai-model-card-image"></div>
        <div class="civitai-model-card-content">
            <h4 class="civitai-model-card-title">{{modelName}}</h4>
            <p class="civitai-model-card-meta">by {{creator}} • {{type}}</p>
            <p class="civitai-model-card-description">{{description}}</p>

            <div class="civitai-model-card-stats-row">
                <div class="civitai-model-card-stats"></div>
                <div class="civitai-model-card-triggers"></div>
            </div>

            <div class="civitai-model-card-actions">
                <div class="civitai-card-btn-group">
                    <button class="civitai-card-btn civitai-details-btn">📖 Details</button>
                </div>
                <div class="civitai-card-stats-small"></div>
            </div>
        </div>
    </div>
</div>
