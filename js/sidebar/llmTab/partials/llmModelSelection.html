<div class="llm-model-selection">
    <div class="llm-selection-row">
        <div class="llm-form-group">
            <label class="llm-label">Provider</label>
            <div class="llm-select-host llm-provider-host"></div>
        </div>
        <div class="llm-form-group">
            <label class="llm-label">Model</label>
            <div class="llm-select-host llm-model-host"></div>
        </div>
    </div>
    <div class="llm-selection-row">
        <div class="llm-form-group">
            <label class="llm-label">Preset</label>
            <div class="llm-select-host llm-preset-host"></div>
        </div>
        <div class="llm-preset-actions">
            <button type="button" class="llm-btn llm-btn-secondary llm-btn-small llm-save-preset-btn" title="Save current settings as preset">💾 Save</button>
            <button type="button" class="llm-btn llm-btn-secondary llm-btn-small llm-manage-presets-btn" title="Manage presets and system prompts">⚙️ Manage</button>
        </div>
    </div>
    <div class="llm-selection-row">
        <div class="llm-status-indicator">
            <span class="status-dot"></span>
            <span class="status-text">Checking status...</span>
        </div>
        <button type="button" class="llm-btn llm-btn-secondary llm-refresh-btn" title="Reload model list">🔄 Refresh Models</button>
    </div>
</div>
